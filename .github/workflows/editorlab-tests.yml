name: EditorLab Tests

on:
  pull_request:
    paths:
      - "EditorLab/**"
      - ".github/workflows/editorlab-tests.yml"
  push:
    branches:
      - main
    paths:
      - "EditorLab/**"
      - ".github/workflows/editorlab-tests.yml"

jobs:
  editorlab-tests:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode path
        run: xcode-select -p

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run EditorLab package tests
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
          CLANG_MODULE_CACHE_PATH: /tmp/editorlab-clang-cache
          SWIFTPM_ENABLE_CLANG_MODULE_CACHE: "1"
        run: xcrun swift test --package-path EditorLab
